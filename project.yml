name: Harusem
options:
  bundleIdPrefix: com.harusem
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  HarusemKit:
    path: HarusemKit

targets:
  Harusem:
    type: application
    platform: iOS
    sources:
      - Harusem
    dependencies:
      - package: HarusemKit
        product: HarusemKit
    scheme:
      testTargets: []
      gatherCoverageData: false
      storeKitConfiguration: Harusem.storekit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harusem.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
