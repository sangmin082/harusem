name: Harusem
options:
  bundleIdPrefix: com.harusem
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  HarusemKit:
    path: HarusemKit
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  Harusem:
    type: application
    platform: iOS
    sources:
      - Harusem
    dependencies:
      - package: HarusemKit
        product: HarusemKit
      - package: GoogleMobileAds
        product: GoogleMobileAds
    scheme:
      testTargets: []
      gatherCoverageData: false
      storeKitConfiguration: Harusem.storekit
    info:
      path: Harusem/Info.plist
      properties:
        CFBundleDisplayName: 하루셈
        # 리터럴로 박히면 CI의 CURRENT_PROJECT_VERSION 주입이 무시되므로 빌드 설정 참조로 둔다
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
