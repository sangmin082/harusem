name: TestFlight

# 수동 실행: Actions 탭 → TestFlight → Run workflow
# 필요한 저장소 시크릿 (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID    — App Store Connect API 키의 Key ID
#   ASC_ISSUER_ID — App Store Connect API의 Issuer ID
#   ASC_KEY_P8    — .p8 개인 키 파일 내용 전체 (-----BEGIN PRIVATE KEY----- 포함)
# 키는 App Store Connect → 사용자 및 액세스 → 통합 → 팀 키에서
# 역할 "App Manager" 이상으로 발급해야 클라우드 서명(인증서/프로필 자동 생성)이 동작한다.

on:
  workflow_dispatch:

jobs:
  upload:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8; do
            if [ -z "${!name}" ]; then
              echo "::error::저장소 시크릿 $name 이 설정되지 않았습니다 (Settings → Secrets and variables → Actions)"
              exit 1
            fi
          done

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s\n' "$ASC_KEY_P8" > "$RUNNER_TEMP/asc/AuthKey.p8"

      - name: Archive (cloud-managed signing)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Harusem.xcodeproj \
            -scheme Harusem \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Harusem.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER \
            | tail -80

      - name: Export & upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>R49JBP66QZ</string>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Harusem.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | tail -60
          echo "업로드 완료 — App Store Connect 처리(10~30분) 후 TestFlight에 나타납니다 (빌드 번호: $GITHUB_RUN_NUMBER)"
