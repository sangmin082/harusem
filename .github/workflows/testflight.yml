name: TestFlight

# 수동 실행: Actions 탭 → TestFlight → Run workflow
# 필요한 저장소 시크릿 (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID    — App Store Connect API 키의 Key ID (Admin 역할 필수)
#   ASC_ISSUER_ID — App Store Connect API의 Issuer ID
#   ASC_KEY_P8    — .p8 개인 키 파일 내용 전체 (-----BEGIN PRIVATE KEY----- 포함)
#
# 서명/업로드는 fastlane(cert → sigh → gym → pilot)으로 처리한다.
# App Store Connect 요구사항: iOS 26 SDK(Xcode 26) 이상으로 빌드해야 업로드 가능.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Harusem/**"
      - "HarusemKit/Sources/**"
      - "project.yml"
      - "Harusem.storekit"
      - "fastlane/**"
      - ".github/workflows/testflight.yml"

jobs:
  upload:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8; do
            if [ -z "${!name}" ]; then
              echo "::error::저장소 시크릿 $name 이 설정되지 않았습니다"
              exit 1
            fi
          done

      - name: Select Xcode 26+
        run: |
          echo "사용 가능한 Xcode:"
          ls -d /Applications/Xcode*.app
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XCODE" ]; then
            echo "::warning::Xcode 26이 이 러너 이미지에 없어 최신 버전으로 대체합니다 (업로드 검증에서 SDK 버전 거절 가능)"
            XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          fi
          echo "선택: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & upload via fastlane
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: fastlane beta
