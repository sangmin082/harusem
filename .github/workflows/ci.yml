name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  # 엔진(순수 Swift Package)은 리눅스에서 빠르게 검증
  engine-linux:
    name: Engine tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Run engine tests
        run: swift test --package-path HarusemKit
      - name: CLI smoke test
        run: swift run --package-path HarusemKit harusem-gen 2026-07-04

  # 앱 타깃(SwiftUI)은 macOS에서 컴파일 검증
  app-ios:
    name: App build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build app
        run: |
          set -o pipefail
          xcodebuild -scheme Harusem \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            build | tail -100
      - name: Run engine tests (macOS)
        run: swift test --package-path HarusemKit
