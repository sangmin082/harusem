name: Deploy Pages

# docs/ 정적 페이지(개인정보처리방침·지원)를 GitHub Pages로 배포.
# App Store 심사에 개인정보처리방침 URL이 필수라 저장소에서 직접 호스팅한다.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # environment 블록을 쓰면 Pages 미활성 상태에서 잡이 게이트에 걸려 시작조차 못 한다.
    # configure-pages(enablement)가 사이트를 먼저 만들 수 있도록 게이트 없이 실행한다.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
